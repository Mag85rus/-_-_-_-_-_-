<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обучение курьеров</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ---- Базовые стили (без изменений) ---- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF244C;
            --terracotta: #CD5C5C;
            --copper: #C74100;
            --burgundy: #800000;
            --bg-light: #f5f0eb;
            --card-bg: rgba(255, 255, 255, 0.8);
            --shadow: 0 8px 24px rgba(128, 0, 0, 0.08);
            --radius: 28px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(circle at 10% 30%, rgba(205, 92, 92, 0.08) 0%, transparent 50%),
                              radial-gradient(circle at 90% 70%, rgba(199, 65, 0, 0.06) 0%, transparent 50%);
        }

        .app {
            max-width: 820px;
            width: 100%;
            background: linear-gradient(145deg, #faf6f0, #f0e8df);
            border-radius: var(--radius);
            padding: 30px 32px 40px;
            box-shadow: 0 20px 40px rgba(128, 0, 0, 0.12);
            position: relative;
            overflow: hidden;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }

        .app::before {
            content: '';
            position: absolute;
            top: -80px;
            right: -80px;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(255,36,76,0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .app::after {
            content: '';
            position: absolute;
            bottom: -60px;
            left: -60px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(199,65,0,0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* ---- Блок выбора языка ---- */
        .language-selector {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 500px;
            text-align: center;
            position: relative;
            z-index: 5;
        }
        .language-selector h2 {
            font-size: 28px;
            font-weight: 900;
            color: #2d1f17;
            margin-bottom: 8px;
        }
        .language-selector p {
            font-size: 16px;
            color: #5a4a3a;
            margin-bottom: 30px;
        }
        .lang-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-bottom: 30px;
        }
        .lang-btn {
            background: rgba(255,255,255,0.6);
            border: 2px solid rgba(205,92,92,0.2);
            border-radius: 20px;
            padding: 14px 28px;
            font-weight: 700;
            font-size: 18px;
            color: #2d1f17;
            cursor: pointer;
            transition: all 0.25s ease;
            min-width: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .lang-btn:hover {
            background: rgba(255,255,255,0.8);
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .lang-btn.selected {
            border-color: var(--primary);
            background: rgba(255,36,76,0.08);
            box-shadow: 0 0 0 3px rgba(255,36,76,0.2);
        }
        .lang-btn img {
            width: 28px;
            height: auto;
        }
        .btn-continue {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 14px 48px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 6px 14px rgba(255,36,76,0.25);
        }
        .btn-continue:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,36,76,0.3);
        }
        .btn-continue:disabled {
            opacity: 0.4;
            pointer-events: none;
            transform: none;
        }

        /* ---- Основное приложение (обучение) ---- */
        .app-content {
            display: none;
            flex-direction: column;
            flex: 1;
        }
        .app-content.visible {
            display: flex;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
            position: relative;
            z-index: 2;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-icon {
            width: 38px;
            height: 38px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(255,36,76,0.25);
        }
        .brand-text {
            font-weight: 700;
            font-size: 16px;
            color: #3a2a22;
        }
        .brand-text span { color: var(--primary); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .lang-switcher {
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.4);
            border-radius: 30px;
            padding: 4px;
            border: 1px solid rgba(205,92,92,0.15);
        }
        .lang-switcher button {
            background: transparent;
            border: none;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
            color: #5a4a3a;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-switcher button.active {
            background: var(--primary);
            color: #fff;
        }
        .lang-switcher button:hover:not(.active) {
            background: rgba(255,36,76,0.1);
        }

        .score-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .score {
            background: rgba(255,36,76,0.12);
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 15px;
            color: var(--burgundy);
            border: 1px solid rgba(255,36,76,0.15);
        }
        .score i {
            color: var(--primary);
            margin-right: 6px;
        }
        .progress-indicator {
            font-size: 14px;
            font-weight: 600;
            color: #5a4a3a;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(205, 92, 92, 0.2);
            border-radius: 10px;
            margin-bottom: 24px;
            overflow: hidden;
            position: relative;
            z-index: 2;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--copper));
            border-radius: 10px;
            transition: width 0.6s ease;
        }

        .step-container {
            flex: 1;
            position: relative;
            z-index: 2;
        }

        .step {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .step.active {
            display: block;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .step h2 {
            font-size: 26px;
            font-weight: 900;
            color: #2d1f17;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }
        .step .subtitle {
            font-size: 15px;
            color: #5a4a3a;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            padding-left: 14px;
            opacity: 0.8;
        }

        .card-content {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 22px;
            padding: 24px 26px;
            border: 1px solid rgba(255,255,255,0.6);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .card-content p {
            font-size: 15px;
            line-height: 1.7;
            color: #3f332a;
            margin-bottom: 14px;
        }
        .card-content ul {
            list-style: none;
            padding: 0;
        }
        .card-content ul li {
            padding: 6px 0;
            font-size: 15px;
            line-height: 1.5;
            color: #3f332a;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .card-content ul li i {
            color: var(--primary);
            width: 20px;
            margin-top: 3px;
        }
        .highlight {
            background: rgba(255,36,76,0.06);
            border-left: 4px solid var(--primary);
            padding: 12px 16px;
            border-radius: 14px;
            margin: 14px 0;
        }

        .badge-step {
            display: inline-block;
            background: rgba(205, 92, 92, 0.15);
            color: var(--burgundy);
            font-size: 12px;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 30px;
            border: 1px solid rgba(205, 92, 92, 0.2);
        }

        /* Тест */
        .question {
            margin-bottom: 22px;
        }
        .question p {
            font-weight: 700;
            font-size: 16px;
            color: #2d1f17;
            margin-bottom: 10px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .option {
            background: rgba(255,255,255,0.5);
            border: 2px solid rgba(205, 92, 92, 0.15);
            border-radius: 14px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
            color: #2d1f17;
        }
        .option:hover {
            border-color: var(--terracotta);
            background: rgba(255,255,255,0.7);
        }
        .option.selected {
            border-color: var(--primary);
            background: rgba(255,36,76,0.05);
        }
        .option.correct {
            border-color: #2e7d32;
            background: rgba(46, 125, 50, 0.08);
        }
        .option.wrong {
            border-color: var(--primary);
            background: rgba(255,36,76,0.08);
        }
        .option.disabled {
            pointer-events: none;
            opacity: 0.7;
        }
        .option .feedback {
            display: block;
            font-size: 13px;
            margin-top: 4px;
            font-weight: 600;
        }
        .option .feedback.correct { color: #2e7d32; }
        .option .feedback.wrong { color: var(--primary); }

        .test-result {
            margin-top: 16px;
        }
        .test-result .result-item {
            background: rgba(255,255,255,0.5);
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
        }
        .test-result .result-item.pass {
            border-left-color: #2e7d32;
        }
        .test-result .result-item.fail {
            border-left-color: var(--primary);
        }
        .test-result .result-item .q-text {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .test-result .result-item .answer {
            font-size: 14px;
            color: #3f332a;
        }
        .test-result .result-item .explanation {
            font-size: 14px;
            color: #5a4a3a;
            margin-top: 4px;
            background: rgba(0,0,0,0.02);
            padding: 6px 10px;
            border-radius: 8px;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(205, 92, 92, 0.08);
        }
        .checklist-item:last-child {
            border-bottom: none;
        }
        .checklist-item input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: var(--primary);
            cursor: pointer;
            flex-shrink: 0;
        }
        .checklist-item label {
            font-size: 15px;
            color: #3f332a;
            cursor: pointer;
            flex: 1;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 8px;
            flex-wrap: wrap;
            position: relative;
            z-index: 2;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(255,255,255,0.6);
            color: #3a2a22;
            border: 1px solid rgba(205, 92, 92, 0.2);
            flex: 1;
            min-width: 120px;
            text-align: center;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            border: none;
            box-shadow: 0 6px 14px rgba(255,36,76,0.25);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,36,76,0.3);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            pointer-events: none;
            transform: none;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.6);
            border: 1px solid rgba(205, 92, 92, 0.15);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.8);
        }
        .btn-success {
            background: var(--copper);
            color: #fff;
            border: none;
            box-shadow: 0 6px 14px rgba(199,65,0,0.25);
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(199,65,0,0.3);
        }
        .btn-success:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: #fff;
        }

        .final {
            text-align: center;
            padding: 20px 0;
        }
        .final .big-icon {
            font-size: 72px;
            color: var(--primary);
            margin-bottom: 16px;
        }
        .final h2 {
            font-size: 32px;
        }
        .final .score-final {
            font-size: 48px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--copper));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .final .stars {
            font-size: 32px;
            letter-spacing: 6px;
            color: #FFD700;
            margin: 12px 0;
        }

        .certificate {
            background: #fff;
            padding: 24px 30px;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            margin: 20px 0 16px;
            border: 2px solid var(--primary);
            position: relative;
        }
        .certificate h3 {
            font-size: 22px;
            font-weight: 900;
            color: var(--burgundy);
        }
        .certificate p {
            font-size: 16px;
            color: #3f332a;
            margin: 6px 0;
        }
        .certificate .name {
            font-size: 28px;
            font-weight: 700;
            color: #2d1f17;
            border-bottom: 2px dashed var(--primary);
            display: inline-block;
            padding: 0 20px 4px;
            margin: 6px 0 10px;
        }
        .certificate .meta {
            font-size: 13px;
            color: #8a7a6a;
            margin-top: 12px;
        }

        #certCanvas {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 640px) {
            .app {
                padding: 20px 16px;
                border-radius: 20px;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .score-area {
                justify-content: space-between;
            }
            .step h2 {
                font-size: 22px;
            }
            .card-content {
                padding: 18px 16px;
            }
            .btn {
                min-width: 100px;
                padding: 10px 16px;
                font-size: 14px;
            }
            .nav-buttons {
                flex-direction: column;
            }
            .btn {
                flex: none;
                width: 100%;
            }
            .lang-grid {
                flex-direction: column;
                align-items: stretch;
            }
            .lang-btn {
                min-width: unset;
            }
        }

        @media print {
            body { background: #fff; padding: 0; }
            .app {
                box-shadow: none;
                background: #fff;
                border-radius: 0;
                padding: 0.6cm;
            }
            .btn, .nav-buttons {
                display: none !important;
            }
            .step {
                display: block !important;
                page-break-after: always;
            }
            .step.active {
                display: block !important;
            }
            .certificate {
                border: 2px solid #800000;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
<div class="app" id="app">

    <!-- ===== Блок выбора языка ===== -->
    <div class="language-selector" id="languageSelector">
        <h2>🌐 Выберите язык / Тилди тандаңыз / Забон интихоб кунед / Tilni tanlang</h2>
        <p>Выберите язык, на котором будет проходить обучение</p>
        <div class="lang-grid" id="langGrid">
            <button class="lang-btn" data-lang="ru">🇷🇺 Русский</button>
            <button class="lang-btn" data-lang="ky">🇰🇬 Кыргызча</button>
            <button class="lang-btn" data-lang="tg">🇹🇯 Тоҷикӣ</button>
            <button class="lang-btn" data-lang="uz">🇺🇿 Oʻzbekcha</button>
        </div>
        <button class="btn-continue" id="btnContinue" disabled>Продолжить / Улантуу / Идома / Davom etish</button>
    </div>

    <!-- ===== Основной контент (обучение) ===== -->
    <div class="app-content" id="appContent">
        <!-- Шапка -->
        <div class="header">
            <div class="brand">
                <div class="brand-icon"><i class="fas fa-route"></i></div>
                <div class="brand-text">Доставка <span>•</span> Обучение <span>•</span> Качество <span>•</span> Скорость <span>•</span> Забота</div>
            </div>
            <div class="header-right">
                <div class="lang-switcher" id="langSwitcher">
                    <button data-lang="ru">RU</button>
                    <button data-lang="ky">KG</button>
                    <button data-lang="tg">TJ</button>
                    <button data-lang="uz">UZ</button>
                </div>
                <div class="score-area">
                    <span class="progress-indicator" id="stepIndicator">1 / 6</span>
                    <span class="score" id="scoreDisplay"><i class="fas fa-star"></i> <span id="scoreValue">0</span></span>
                </div>
            </div>
        </div>

        <!-- Прогресс-бар -->
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- Контейнер шагов -->
        <div class="step-container" id="stepContainer">
            <!-- Все шаги будут генерироваться через JS -->
        </div>
    </div>
</div>

<script>

    // ============================
    function getText(path) {
        const parts = path.split('.');
        let obj = TRANSLATIONS[currentLang];
        for (let p of parts) {
            if (obj && obj[p] !== undefined) obj = obj[p];
            else return path;
        }
        return obj;
    }

    function t(path) {
        return getText(path);
    }

    function setLanguage(lang) {
        currentLang = lang;
        // Обновить активную кнопку в языковом переключателе
        document.querySelectorAll('#langSwitcher button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.lang === lang);
        });
        // Перерисовать всё обучение
        renderAll();
        // Обновить имя в сертификате, если на финальном шаге
        if (currentStep === 7) {
            generateCertificate();
        }
    }

                    <button class="btn btn-primary" onclick="nextStep()">${t('buttons.next')} <i class="fas fa-arrow-right"></i></button>
                </div>
            </div>
        `;
    }

    function renderStep2() {
        const m = t('module2');
        return `
            <div class="step" data-step="2">
                <h2>${m.title}</h2>
                <div class="subtitle">${m.subtitle}</div>
                <div class="card-content">
                    <p><strong>${m.step1}</strong></p>
                    <p><strong>${m.step2_1}</strong></p>
                    <p><strong>${m.step2_2}</strong></p>
                    <p><strong>${m.step3}</strong></p>
                    <p><strong>${m.step4}</strong></p>
                    <div class="badge-step"><i class="far fa-clock"></i> ${m.badge}</div>
                </div>
                <div class="nav-buttons">
                    <button class="btn btn-secondary" onclick="prevStep()"><i class="fas fa-arrow-left"></i> ${t('buttons.back')}</button>
                    <button class="btn btn-primary" onclick="nextStep()">${t('buttons.next')} <i class="fas fa-arrow-right"></i></button>
                </div>
            </div>
        `;
    }

    function renderStep3() {
        const m = t('module3');
        return `
            <div class="step" data-step="3">
                <h2>${m.title}</h2>
                <div class="subtitle">${m.subtitle}</div>
                <div class="card-content">
                    <p><strong>${m.why}</strong></p>
                    <ul>
                        ${m.list.map(item => `<li><i class="fas fa-phone"></i> ${item}</li>`).join('')}
                    </ul>
                    <div class="highlight">
                        <i class="fas fa-undo-alt" style="color: var(--copper);"></i> <strong>${m.highlight}</strong>
                    </div>
                </div>
                <div class="nav-buttons">
                    <button class="btn btn-secondary" onclick="prevStep()"><i class="fas fa-arrow-left"></i> ${t('buttons.back')}</button>
                    <button class="btn btn-primary" onclick="nextStep()">${t('buttons.next')} <i class="fas fa-arrow-right"></i></button>
                </div>
            </div>
        `;
    }

    function renderStep4() {
        const m = t('module4');
        let html = `
            <div class="step" data-step="4">
                <h2>${m.title}</h2>
                <div class="subtitle">${m.subtitle}</div>
                <div class="card-content">
                    <ul>
        `;
        m.errors.forEach(e => {
            html += `<li><i class="fas fa-times-circle" style="color: var(--primary);"></i> <strong>${e.error}</strong><br><i class="fas fa-check-circle" style="color: #2e7d32;"></i> <strong>${e.correct}</strong></li>`;
        });
        html += `
                    </ul>
                </div>
                <div class="nav-buttons">
                    <button class="btn btn-secondary" onclick="prevStep()"><i class="fas fa-arrow-left"></i> ${t('buttons.back')}</button>
                    <button class="btn btn-primary" onclick="nextStep()">${t('buttons.next')} <i class="fas fa-arrow-right"></i></button>
                </div>
            </div>
        `;
        return html;
    }

    function renderStep5() {
        const test = t('test');
        let html = `
            <div class="step" data-step="5">
                <h2>${test.title}</h2>
                <div class="subtitle">${test.subtitle}</div>
                <div class="card-content" id="testContainer">
        `;
        test.questions.forEach((q, idx) => {
            html += `<div class="question" data-q="${idx}">`;
            html += `<p>${q.question}</p>`;
            html += `<div class="options">`;
            q.options.forEach((opt, optIdx) => {
                html += `<div class="option" data-q="${idx}" data-opt="${optIdx}" onclick="selectOption(${idx}, ${optIdx})">${opt}</div>`;
            });
            html += `</div>`;
            html += `</div>`;
        });
        html += `
                </div>
                <div id="testResultContainer" style="display: none;"></div>
                <div class="nav-buttons">
                    <button class="btn btn-secondary" onclick="prevStep()"><i class="fas fa-arrow-left"></i> ${t('buttons.back')}</button>
                    <button class="btn btn-success" id="submitTestBtn" onclick="submitTest()">${t('buttons.submitTest')}</button>
                    <button class="btn btn-primary hidden" id="goToChecklistBtn" onclick="goToStep(6)">${t('buttons.goToChecklist')} <i class="fas fa-arrow-right"></i></button>
                </div>
            </div>
        `;
        return html;
    }

    function renderStep6() {
        const cl = t('checklist');
        let html = `
            <div class="step" data-step="6">
                <h2>${cl.title}</h2>
                <div class="subtitle">${cl.subtitle}</div>
                <div class="card-content" id="checklistContainer">
        `;
        cl.items.forEach((item, idx) => {
            html += `
                <div class="checklist-item">
                    <input type="checkbox" id="chk${idx}" onchange="updateChecklist()">
                    <label for="chk${idx}">${item}</label>
                </div>
            `;
        });
        html += `
                </div>
                <div class="nav-buttons">
                    <button class="btn btn-secondary" onclick="prevStep()"><i class="fas fa-arrow-left"></i> ${t('buttons.back')}</button>
                    <button class="btn btn-success" id="finishBtn" onclick="finishCourse()">${t('buttons.finish')} <i class="fas fa-graduation-cap"></i></button>
                </div>
            </div>
        `;
        return html;
    }

    function renderStep7() {
        const f = t('final');
        const dateStr = new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
        const meta = f.certificate.meta.replace('{date}', dateStr);
        return `
            <div class="step" data-step="7">
                <div class="final">
                    <div class="big-icon"><i class="fas fa-trophy"></i></div>
                    <h2>${f.title}</h2>
                    <p style="font-size: 18px; color: #3f332a;">${f.subtitle}</p>
                    <div class="stars">⭐⭐⭐⭐⭐</div>
                    <p style="font-size: 20px; font-weight: 600;">${f.scoreText} <span class="score-final" id="finalScore">${score}</span></p>

                    <div class="certificate" id="certificateArea">
                        <h3>${f.certificate.title}</h3>
                        <p>${f.certificate.text1}</p>
                        <div class="name" id="certName">${userName || f.certificate.name}</div>
                        <p>${f.certificate.text2}</p>
                        <p style="font-size: 14px; color: #5a4a3a;">${f.certificate.text3}</p>
                        <div class="meta">${meta}</div>
                    </div>

                    <div style="margin-top: 20px;">
                        <button class="btn btn-secondary" onclick="location.reload()"><i class="fas fa-redo"></i> ${t('buttons.restart')}</button>
                    </div>
                    <canvas id="certCanvas" width="800" height="500"></canvas>
                </div>
            </div>
        `;
    }

    function renderAll() {
        // Сохраняем текущий шаг, но пересоздаём все шаги
        const stepsHtml = [
            renderStep0(),
            renderStep1(),
            renderStep2(),
            renderStep3(),
            renderStep4(),
            renderStep5(),
            renderStep6(),
            renderStep7()
        ];
        stepContainer.innerHTML = stepsHtml.join('');

        // Показать нужный шаг
        stepsHtml.forEach((_, i) => {
            const stepEl = document.querySelector(`.step[data-step="${i}"]`);
            if (stepEl) stepEl.classList.toggle('active', i === currentStep);
        });

        // Обновить прогресс
        updateUI();

        // Сбросить состояние теста и чек-листа, если мы не на соответствующих шагах
        // Однако мы не сбрасываем глобальные состояния, чтобы сохранить прогресс.
        // Но при смене языка мы должны перерисовать тест и чеклист с текущими выбранными ответами.
        // Лучше просто перерисовать, и состояние восстановится из переменных.
        // Поэтому после рендера нужно восстановить выбранные ответы в тесте.
        if (currentStep === 5) {
            // Восстановить выбранные ответы
            const options = document.querySelectorAll('.option');
            options.forEach(opt => {
                const qIdx = parseInt(opt.dataset.q);
                const optIdx = parseInt(opt.dataset.opt);
                if (selectedOptions[qIdx] === optIdx) {
                    opt.classList.add('selected');
                }
            });
            // Если тест уже сдан, показать результаты
            if (testSubmitted) {
                showTestResults();
            }
        }
        if (currentStep === 6) {
            // Восстановить чек-лист
            const checkboxes = document.querySelectorAll('#checklistContainer input[type="checkbox"]');
            // Мы не храним состояния чекбоксов, поэтому оставляем их пустыми (пользователь заново отметит)
            // Но если мы хотим сохранить, нужно хранить массив состояний, сейчас не будем усложнять.
        }
        // Обновить имя в инпуте
        const nameInput = document.getElementById('userNameInput');
        if (nameInput) nameInput.value = userName;
        // Обновить кнопку перехода к чек-листу
        const goBtn = document.getElementById('goToChecklistBtn');
        if (goBtn) {
            if (testSubmitted) goBtn.classList.remove('hidden');
            else goBtn.classList.add('hidden');
        }
        // Обновить кнопку теста
        const submitBtn = document.getElementById('submitTestBtn');
        if (submitBtn) {
            if (testSubmitted) {
                submitBtn.disabled = true;
                submitBtn.textContent = t('buttons.submitTest') + ' (пройден)';
            } else {
                submitBtn.disabled = false;
                submitBtn.textContent = t('buttons.submitTest');
            }
        }
        // Если мы на финальном шаге, обновить сертификат
        if (currentStep === 7) {
            generateCertificate();
        }
    }

    // ============================
    // УПРАВЛЕНИЕ ШАГАМИ
    // ============================
    function goToStep(step) {
        if (step < 0 || step >= totalSteps) return;
        // Начисление очков за модули (шаги 1-4)
        if (step >= 1 && step <= 4 && !document.querySelector(`.step[data-step="${step}"]`).dataset.visited) {
            document.querySelector(`.step[data-step="${step}"]`).dataset.visited = 'true';
            addScore(15);
        }
        currentStep = step;
        renderAll();
        updateUI();
        if (step === 7) {
            generateCertificate();
        }
    }

    function nextStep() {
        if (currentStep === 5 && !testSubmitted) {
            alert(t('test.alert') || 'Пожалуйста, сначала пройдите тест, нажав "Завершить тест".');
            return;
        }
        if (currentStep === 6) {
            const checkboxes = document.querySelectorAll('#checklistContainer input[type="checkbox"]');
            let allChecked = true;
            checkboxes.forEach(cb => { if (!cb.checked) allChecked = false; });
            if (!allChecked) {
                alert(t('checklist.alert') || 'Отметьте все пункты чек-листа, чтобы завершить обучение.');
                return;
            }
            if (!document.querySelector('.step[data-step="6"]').dataset.scored) {
                addScore(10);
                document.querySelector('.step[data-step="6"]').dataset.scored = 'true';
            }
        }
        goToStep(currentStep + 1);
    }

    function prevStep() {
        goToStep(currentStep - 1);
    }

    function addScore(points) {
        score += points;
        updateUI();
    }

    function updateUI() {
        let progress = 0;
        if (currentStep >= 1 && currentStep <= 6) {
            progress = ((currentStep) / 6) * 100;
        } else if (currentStep === 7) {
            progress = 100;
        }
        progressFill.style.width = progress + '%';
        let displayStep = currentStep;
        if (displayStep === 0) displayStep = 1;
        else if (displayStep === 7) displayStep = 6;
        else displayStep = currentStep;
        stepIndicator.textContent = `${displayStep} / 6`;
        scoreValue.textContent = score;
        // Обновить финальный счёт, если на финальном шаге
        const finalScore = document.getElementById('finalScore');
        if (finalScore) finalScore.textContent = score;
    }

    // ============================
    // ТЕСТ
    // ============================
    function selectOption(qIdx, optIdx) {
        if (testSubmitted) return;
        const options = document.querySelectorAll(`.question[data-q="${qIdx}"] .option`);
        options.forEach(opt => opt.classList.remove('selected'));
        options[optIdx].classList.add('selected');
        selectedOptions[qIdx] = optIdx;
    }

    function showTestResults() {
        const test = t('test');
        let correctCount = 0;
        const resultHtml = [];
        test.questions.forEach((q, idx) => {
            const selected = selectedOptions[idx];
            const isCorrect = (selected === q.correct);
            if (isCorrect) correctCount++;
            const passClass = isCorrect ? 'pass' : 'fail';
            const correctAnswer = q.options[q.correct];
            const userAnswer = q.options[selected];
            resultHtml.push(`
                <div class="result-item ${passClass}">
                    <div class="q-text">${q.question}</div>
                    <div class="answer">${isCorrect ? '✅ ' + (t('test.correct') || 'Правильно') : '❌ ' + (t('test.wrong') || 'Неправильно')}</div>
                    <div class="answer">${t('test.yourAnswer') || 'Ваш ответ'}: ${userAnswer}</div>
                    <div class="answer">${t('test.correctAnswer') || 'Правильный ответ'}: <strong>${correctAnswer}</strong></div>
                    <div class="explanation"><i class="fas fa-lightbulb" style="color: var(--copper);"></i> ${q.explanation}</div>
                </div>
            `);
        });
        const container = document.getElementById('testResultContainer');
        container.innerHTML = `<div class="test-result">${resultHtml.join('')}</div>`;
        container.style.display = 'block';
        const earned = correctCount * 5;
        addScore(earned);
        return correctCount;
    }

    function submitTest() {
        if (testSubmitted) return;
        const test = t('test');
        for (let i = 0; i < test.questions.length; i++) {
            if (selectedOptions[i] === undefined) {
                alert(`Ответьте на вопрос ${i+1}`);
                return;
            }
        }
        const correctCount = showTestResults();
        testSubmitted = true;
        document.getElementById('submitTestBtn').disabled = true;
        document.getElementById('submitTestBtn').textContent = t('buttons.submitTest') + ' ✓';
        document.getElementById('goToChecklistBtn').classList.remove('hidden');
    }

    // ============================
    // ЧЕК-ЛИСТ
    // ============================
    function updateChecklist() {
        // просто обновляем состояние
    }

    function finishCourse() {
        const checkboxes = document.querySelectorAll('#checklistContainer input[type="checkbox"]');
        let allChecked = true;
        checkboxes.forEach(cb => { if (!cb.checked) allChecked = false; });
        if (!allChecked) {
            alert(t('checklist.alert') || 'Отметьте все пункты чек-листа, чтобы завершить обучение.');
            return;
        }
        if (!document.querySelector('.step[data-step="6"]').dataset.scored) {
            addScore(10);
            document.querySelector('.step[data-step="6"]').dataset.scored = 'true';
        }
        goToStep(7);
    }

    // ============================
    // СЕРТИФИКАТ (canvas)
    // ============================
    function generateCertificate() {
        const name = userName || t('final.certificate.name') || 'Курьер';
        document.getElementById('certName').textContent = name;
        const now = new Date();
        const dateStr = now.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
        const meta = t('final.certificate.meta').replace('{date}', dateStr);
        document.querySelector('.certificate .meta').textContent = meta;

        const canvas = document.getElementById('certCanvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;
        const grad = ctx.createLinearGradient(0, 0, w, h);
        grad.addColorStop(0, '#faf6f0');
        grad.addColorStop(1, '#f0e8df');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = '#FF244C';
        ctx.lineWidth = 12;
        ctx.strokeRect(20, 20, w-40, h-40);
        ctx.strokeStyle = '#800000';
        ctx.lineWidth = 4;
        ctx.strokeRect(36, 36, w-72, h-72);

        ctx.fillStyle = '#2d1f17';
        ctx.font = 'bold 40px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('📜 ' + (t('final.certificate.title') || 'Сертификат'), w/2, 80);

        ctx.font = '24px Inter, sans-serif';
        ctx.fillStyle = '#3f332a';
        ctx.fillText(t('final.certificate.text1') || 'Настоящим подтверждается, что', w/2, 140);

        ctx.font = 'bold 48px Inter, sans-serif';
        ctx.fillStyle = '#800000';
        ctx.fillText(name, w/2, 220);

        ctx.font = '22px Inter, sans-serif';
        ctx.fillStyle = '#3f332a';
        ctx.fillText(t('final.certificate.text2') || 'успешно освоил новый алгоритм передачи заказа', w/2, 290);

        ctx.font = '18px Inter, sans-serif';
        ctx.fillStyle = '#5a4a3a';
        ctx.fillText(t('final.certificate.text3') || 'и подтвердил свои знания тестированием', w/2, 340);

        ctx.font = '16px Inter, sans-serif';
        ctx.fillStyle = '#8a7a6a';
        ctx.fillText(meta, w/2, 400);

        ctx.font = '16px Inter, sans-serif';
        ctx.fillStyle = '#3f332a';
        ctx.fillText('Методолог', 180, 460);
        ctx.fillText('Курьер-эксперт', w-180, 460);
        ctx.beginPath();
        ctx.moveTo(100, 450);
        ctx.lineTo(260, 450);
        ctx.strokeStyle = '#800000';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(w-260, 450);
        ctx.lineTo(w-100, 450);
        ctx.stroke();

        canvas.dataset.generated = 'true';
    }

    // ============================
    // ВЫБОР ЯЗЫКА
    // ============================
    let selectedLang = null;

    langGrid.addEventListener('click', (e) => {
        const btn = e.target.closest('.lang-btn');
        if (!btn) return;
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedLang = btn.dataset.lang;
        btnContinue.disabled = false;
        // Поменять текст кнопки на выбранный язык
        const langName = TRANSLATIONS[selectedLang]?.langName || selectedLang;
        btnContinue.textContent = `Продолжить / Улантуу / Идома / Davom etish (${langName})`;
    });

    btnContinue.addEventListener('click', () => {
        if (!selectedLang) return;
        // Скрыть выбор языка, показать обучение
        languageSelector.style.display = 'none';
        appContent.classList.add('visible');
        // Установить язык
        setLanguage(selectedLang);
        // Активировать переключатель
        document.querySelectorAll('#langSwitcher button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.lang === selectedLang);
        });
        // Инициализация
        currentStep = 0;
        renderAll();
        updateUI();
        // Подписаться на изменение имени
        const nameInput = document.getElementById('userNameInput');
        if (nameInput) {
            nameInput.addEventListener('input', function() {
                userName = this.value.trim();
            });
        }
    });

    // Переключатель языка в шапке
    langSwitcher.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        const lang = btn.dataset.lang;
        if (lang === currentLang) return;
        setLanguage(lang);
        // Если мы на финальном шаге, обновить сертификат
        if (currentStep === 7) {
            generateCertificate();
        }
        // Обновить кнопки активные
        document.querySelectorAll('#langSwitcher button').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    });

    // Инициализация (показываем выбор языка)
    // По умолчанию скрываем обучение
    appContent.classList.remove('visible');
    languageSelector.style.display = 'flex';

    // Для глобального доступа из onclick
    window.nextStep = nextStep;
    window.prevStep = prevStep;
    window.selectOption = selectOption;
    window.submitTest = submitTest;
    window.updateChecklist = updateChecklist;
    window.finishCourse = finishCourse;
    window.goToStep = goToStep;
    window.setLanguage = setLanguage;
    window.renderAll = renderAll;
    window.generateCertificate = generateCertificate;
</script>
</body>
</html>
